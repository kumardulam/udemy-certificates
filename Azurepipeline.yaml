trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'YOUR_ACR_NAME'
  acrLoginServer: 'YOUR_ACR_NAME.azurecr.io'
  imageName: 'expensetracker'
  imageTag: '$(Build.BuildId)'
  acrServiceConnection: 'acr-connection'
  aksServiceConnection: 'aks-connection'
  k8sNamespace: 'default'

stages:

- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:

    - task: NodeTool@0
      displayName: 'Install Node.js 18'
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install --legacy-peer-deps
      displayName: 'Install dependencies'

    - script: |
        npm run build
      displayName: 'Build React app'
      env:
        CI: false

    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageName)'
        command: 'build'
        Dockerfile: 'Dockerfile'
        tags: |
          $(imageTag)
          latest

    - task: Docker@2
      displayName: 'Push Docker image to ACR'
      inputs:
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(imageName)'
        command: 'push'
        tags: |
          $(imageTag)
          latest

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Kubernetes manifests'
      inputs:
        targetPath: 'k8s'
        artifact: 'manifests'
        publishLocation: 'pipeline'

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToAKS
    displayName: 'Deploy to AKS'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Kubernetes manifests'
            inputs:
              artifactName: 'manifests'
              downloadPath: '$(System.ArtifactsDirectory)/k8s'

          - task: KubernetesManifest@0
            displayName: 'Deploy to AKS cluster'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: '$(aksServiceConnection)'
              namespace: '$(k8sNamespace)'
              manifests: |
                $(System.ArtifactsDirectory)/k8s/deployment.yaml
                $(System.ArtifactsDirectory)/k8s/service.yaml
              containers: '$(acrLoginServer)/$(imageName):$(imageTag)'